<style>
* { box-sizing: border-box; }
body {
	margin: 0;
	font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
	background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
	min-height: 100vh;
	color: #1e293b;
}

.app-wrap { max-width: 720px; margin: 0 auto; padding: 3rem 1.25rem 4rem; }

.app-header { text-align: center; margin-bottom: 2rem; }
.app-header h1 { margin: 0 0 .5rem; font-size: 2rem; font-weight: 700; color: #4338ca; }
.app-header p { margin: 0; color: #64748b; font-size: .95rem; }

.summary {
	display: flex;
	justify-content: center;
	gap: 1.5rem;
	margin-bottom: 1.5rem;
	color: #475569;
	font-size: .9rem;
}
.summary strong { color: #4338ca; font-size: 1.1rem; }

.tabs {
	display: flex;
	justify-content: center;
	gap: .5rem;
	margin-bottom: 1.25rem;
}
.tab-btn {
	padding: .5rem 1rem;
	border: 1px solid #e2e8f0;
	border-radius: 9999px;
	background: #fff;
	color: #475569;
	font-size: .85rem;
	cursor: pointer;
	transition: all .2s;
}
.tab-btn:hover { border-color: #6366f1; color: #4338ca; }
.tab-btn.active { background: #6366f1; color: #fff; border-color: #6366f1; }

.todo-list { display: flex; flex-direction: column; gap: .75rem; }

.todo-card {
	display: flex;
	align-items: center;
	gap: 1rem;
	padding: 1rem 1.25rem;
	background: #fff;
	border: 1px solid #e2e8f0;
	border-radius: 12px;
	box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
	transition: all .2s;
	cursor: pointer;
	user-select: none;
}
.todo-card:hover {
	border-color: #c7d2fe;
	transform: translateY(-1px);
	box-shadow: 0 4px 12px rgba(99, 102, 241, .08);
}
.todo-card.done { opacity: .55; }
.todo-card.done .todo-title { text-decoration: line-through; color: #94a3b8; }
.todo-card.pending { opacity: .55; pointer-events: none; }

.checkmark {
	width: 22px;
	height: 22px;
	border-radius: 50%;
	border: 2px solid #cbd5e1;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 12px;
	color: #fff;
	flex-shrink: 0;
	transition: all .2s;
}
.checkmark.done { background: #10b981; border-color: #10b981; }

.todo-body { flex: 1; min-width: 0; }
.todo-title { font-size: 1rem; font-weight: 500; color: #1e293b; margin-bottom: .35rem; }
.todo-meta {
	display: flex;
	flex-wrap: wrap;
	gap: .5rem;
	font-size: .75rem;
	color: #64748b;
	align-items: center;
}

.chip {
	display: inline-flex;
	align-items: center;
	padding: .15rem .55rem;
	border-radius: 9999px;
	font-weight: 500;
}
.chip.priority-높음 { background: #fee2e2; color: #b91c1c; }
.chip.priority-중간 { background: #fef3c7; color: #b45309; }
.chip.priority-낮음 { background: #f1f5f9; color: #475569; }

.chip.cat-업무 { background: #dbeafe; color: #1d4ed8; }
.chip.cat-개인 { background: #d1fae5; color: #047857; }
.chip.cat-학습 { background: #ede9fe; color: #6d28d9; }

.due {
	color: #475569;
	display: inline-flex;
	align-items: center;
	gap: .2rem;
}
.due.overdue { color: #dc2626; font-weight: 600; }

.state-msg {
	text-align: center;
	padding: 2rem 1rem;
	color: #64748b;
	font-size: .95rem;
}
.state-msg.error { color: #dc2626; }
.state-msg.warn { color: #b45309; padding: 1rem; }
.saving-tag { font-size: .7rem; color: #94a3b8; margin-left: .25rem; }
</style>
